<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sandbox Online Game</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        /* Меню */
        #menu {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; pointer-events: all;
        }
        #menu input { padding: 12px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 15px; width: 250px; text-align: center; }
        #menu button { padding: 12px 40px; font-size: 20px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 8px; transition: 0.3s; }
        #menu button:hover { background: #27ae60; transform: scale(1.05); }

        /* Хотбар */
        #hotbar { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 15px;
            pointer-events: all; border: 2px solid #444;
        }
        .slot { 
            width: 70px; height: 70px; border: 2px solid #666; margin: 0 8px; 
            display: flex; align-items: center; justify-content: center; 
            color: #aaa; font-weight: bold; font-size: 10px; border-radius: 10px; text-align: center;
        }
        .active { border-color: #00ff00; background: rgba(0, 255, 0, 0.2); color: white; box-shadow: 0 0 15px rgba(0,255,0,0.3); }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        #status { position: absolute; top: 20px; left: 20px; color: white; font-size: 14px; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: white; margin-bottom: 30px;">SANDBOX MULTIPLAYER</h1>
    <input type="text" id="nickInput" placeholder="Твій нікнейм..." maxlength="12">
    <button id="startBtn">УВІЙТИ В ГРУ</button>
</div>

<div id="ui" style="display: none;">
    <div id="status">Завантаження карти...</div>
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active" id="slot0">🔫 ПІСТОЛЕТ</div>
        <div class="slot" id="slot1">📦 БЛОК</div>
        <div class="slot" id="slot2">💃 JENNY</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

let scene, camera, renderer, controls, pistol;
let currentSlot = 0;
const items = ['pistol', 'block', 'jenny'];
const placedObjects = [];
const moveState = { f: false, b: false, l: false, r: false };

// Ініціалізація гри
function initGame() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 0, 1000);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 5, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(100, 200, 100);
    scene.add(sun);

    // Завантаження Мапи (GLB)
    const gltfLoader = new GLTFLoader();
    gltfLoader.load('map.glb', (gltf) => {
        scene.add(gltf.scene);
        document.getElementById('status').innerText = 'Карта готова! Клікни, щоб грати.';
    });

    // Модель пістолета (проста)
    pistol = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.2, 0.5),
        new THREE.MeshLambertMaterial({ color: 0x222222 })
    );
    pistol.position.set(0.4, -0.3, -0.7);
    camera.add(pistol);
    scene.add(camera);

    controls = new PointerLockControls(camera, document.body);
    document.addEventListener('click', () => { if(document.getElementById('ui').style.display !== 'none') controls.lock(); });

    // Керування
    document.addEventListener('keydown', (e) => {
        if(e.code === 'Digit1') switchSlot(0);
        if(e.code === 'Digit2') switchSlot(1);
        if(e.code === 'Digit3') switchSlot(2);
        if(e.code === 'KeyW') moveState.f = true;
        if(e.code === 'KeyS') moveState.b = true;
        if(e.code === 'KeyA') moveState.l = true;
        if(e.code === 'KeyD') moveState.r = true;
    });

    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveState.f = false;
        if(e.code === 'KeyS') moveState.b = false;
        if(e.code === 'KeyA') moveState.l = false;
        if(e.code === 'KeyD') moveState.r = false;
    });

    document.addEventListener('mousedown', (e) => {
        if (!controls.isLocked) return;
        if (e.button === 0) items[currentSlot] === 'pistol' ? shoot() : spawnItem(items[currentSlot]);
        if (e.button === 2) removeObject();
    });

    animate();
}

function switchSlot(index) {
    document.getElementById(`slot${currentSlot}`).classList.remove('active');
    currentSlot = index;
    document.getElementById(`slot${currentSlot}`).classList.add('active');
    pistol.visible = (items[currentSlot] === 'pistol');
}

function spawnItem(type) {
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const pos = new THREE.Vector3().copy(camera.position).add(dir.multiplyScalar(6));

    if (type === 'block') {
        const block = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({color: Math.random() * 0xffffff}));
        block.position.copy(pos);
        scene.add(block);
        placedObjects.push(block);
    } else if (type === 'jenny') {
        const objLoader = new OBJLoader();
        objLoader.load('jenny.obj', (obj) => {
            obj.position.copy(pos);
            obj.scale.set(0.5, 0.5, 0.5);
            scene.add(obj);
            placedObjects.push(obj);
        });
    }
}

function shoot() {
    const flash = new THREE.PointLight(0xffaa00, 5, 5);
    flash.position.copy(pistol.getWorldPosition(new THREE.Vector3()));
    scene.add(flash);
    setTimeout(() => scene.remove(flash), 50);

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(placedObjects);
    if(intersects.length > 0) {
        // Логіка влучання
    }
}

function removeObject() {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(placedObjects, true);
    if (intersects.length > 0) {
        let obj = intersects[0].object;
        while(obj.parent !== scene) obj = obj.parent;
        scene.remove(obj);
        placedObjects.splice(placedObjects.indexOf(obj), 1);
    }
}

function animate() {
    requestAnimationFrame(animate);
    if (controls.isLocked) {
        const speed = 0.3;
        if(moveState.f) controls.moveForward(speed);
        if(moveState.b) controls.moveForward(-speed);
        if(moveState.l) controls.moveRight(-speed);
        if(moveState.r) controls.moveRight(speed);
    }
    renderer.render(scene, camera);
}

// Запуск меню
document.getElementById('startBtn').onclick = () => {
    const nick = document.getElementById('nickInput').value;
    if(nick.length < 2) return alert("Введи нік!");
    document.getElementById('menu').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    initGame();
};

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
