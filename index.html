<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sandbox 3D Pro</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        #login-screen { position: absolute; width: 100%; height: 100%; background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        input { padding: 12px; margin: 10px; width: 260px; border-radius: 8px; background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { padding: 12px 40px; cursor: pointer; background: #2ed573; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; pointer-events: all; }
        .slot { width: 50px; height: 50px; border: 2px solid #444; margin: 0 5px; display: flex; align-items: center; justify-content: center; color: white; border-radius: 8px; font-size: 20px; }
        .active { border-color: #2ed573; background: rgba(46, 213, 115, 0.2); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); border: 1px solid black; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<div id="login-screen">
    <h1>SANDBOX 3D</h1>
    <input type="text" id="nick" placeholder="Твій нік...">
    <button onclick="startGame()">ГРАТИ</button>
</div>

<div id="ui">
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active">🔫</div>
        <div class="slot">📦</div>
        <div class="slot">💃</div>
    </div>
</div>

<script>
let scene, camera, renderer, pistol, controlsLocked = false;
let currentSlot = 0;
const colliders = []; // Об'єкти, крізь які не можна пройти
const buildables = []; // Об'єкти, які можна видалити
const keys = { w: false, a: false, s: false, d: false, space: false };
let velocityY = 0, canJump = false;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 10, 400);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);
    camera.rotation.order = 'YXZ'; // Важливо для коректного обертання

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    // Земля
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({ color: 0x2ed573 }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Дерева з верхівками
    for(let i=0; i<30; i++) {
        const group = new THREE.Group();
        const x = Math.random()*200-100, z = Math.random()*200-100;
        
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 5), new THREE.MeshLambertMaterial({color: 0x5d3a1a}));
        const leaves = new THREE.Mesh(new THREE.SphereGeometry(2.5, 8, 8), new THREE.MeshLambertMaterial({color: 0x1e5d1c}));
        leaves.position.y = 3.5;
        
        group.add(trunk);
        group.add(leaves);
        group.position.set(x, 2.5, z);
        scene.add(group);
        colliders.push(trunk);
    }

    pistol = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.5), new THREE.MeshLambertMaterial({color: 0x111}));
    pistol.position.set(0.3, -0.2, -0.6);
    camera.add(pistol);
    scene.add(camera);

    // Події миші
    document.addEventListener('mousedown', (e) => {
        if (!controlsLocked) {
            document.body.requestPointerLock();
            return;
        }
        if (e.button === 0) action(); // ЛКМ - Дія
        if (e.button === 2) removeObject(); // ПКМ - Видалити
    });

    document.addEventListener('mousemove', (e) => {
        if (controlsLocked) {
            camera.rotation.y -= e.movementX * 0.002;
            let newX = camera.rotation.x - e.movementY * 0.002;
            // ФІКС ПЕРЕВЕРТАННЯ: Обмеження кута нахилу (90 градусів вгору/вниз)
            camera.rotation.x = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, newX));
        }
    });

    document.addEventListener('pointerlockchange', () => { controlsLocked = document.pointerLockElement === document.body; });
    window.addEventListener('keydown', (e) => { keys[e.code.toLowerCase().replace('key','')] = true; if(e.code === 'Space') keys.space = true; });
    window.addEventListener('keyup', (e) => { keys[e.code.toLowerCase().replace('key','')] = false; if(e.code === 'Space') keys.space = false; });
    window.addEventListener('wheel', (e) => {
        currentSlot = e.deltaY > 0 ? (currentSlot + 1) % 3 : (currentSlot - 1 + 3) % 3;
        document.querySelectorAll('.slot').forEach((s, i) => s.className = i === currentSlot ? 'slot active' : 'slot');
        pistol.visible = (currentSlot === 0);
    });

    animate();
}

function action() {
    if (currentSlot === 0) shoot();
    else spawnItem();
}

function shoot() {
    // Ефект пострілу (трасер)
    const material = new THREE.LineBasicMaterial({ color: 0xffffff });
    const points = [];
    points.push(pistol.getWorldPosition(new THREE.Vector3()));
    
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(buildables);
    
    let endPoint = new THREE.Vector3();
    raycaster.ray.at(100, endPoint);
    if(intersects.length > 0) endPoint = intersects[0].point;

    points.push(endPoint);
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geometry, material);
    scene.add(line);
    setTimeout(() => scene.remove(line), 40); // Куля зникає швидко
}

function spawnItem() {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const pos = new THREE.Vector3();
    raycaster.ray.at(6, pos);

    if (currentSlot === 1) { // Блок
        const b = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({color: 0xffffff}));
        b.position.copy(pos);
        if(b.position.y < 1) b.position.y = 1;
        scene.add(b);
        buildables.push(b);
        colliders.push(b);
    } else if (currentSlot === 2) { // Jenny (завантаження GLB/JSON)
        const loader = new THREE.GLTFLoader();
        loader.load('jenny.glb', (gltf) => {
            const model = gltf.scene;
            model.position.copy(pos);
            model.scale.set(3,3,3);
            scene.add(model);
            buildables.push(model);
        }, undefined, (err) => {
            // Якщо файлу немає, ставимо замінник, щоб гра не впала
            const placeholder = new THREE.Mesh(new THREE.BoxGeometry(1,3,1), new THREE.MeshLambertMaterial({color: 0xff00ff}));
            placeholder.position.copy(pos);
            scene.add(placeholder);
            buildables.push(placeholder);
        });
    }
}

function removeObject() {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(buildables, true);
    if (intersects.length > 0) {
        let obj = intersects[0].object;
        while(obj.parent !== scene) obj = obj.parent; // Знайти головний об'єкт
        scene.remove(obj);
        buildables.splice(buildables.indexOf(obj), 1);
        if(colliders.indexOf(obj) !== -1) colliders.splice(colliders.indexOf(obj), 1);
    }
}

function animate() {
    requestAnimationFrame(animate);
    if (controlsLocked) {
        const speed = 0.15;
        const oldPos = camera.position.clone();
        
        // Рух
        if (keys.w) camera.translateZ(-speed);
        if (keys.s) camera.translateZ(speed);
        if (keys.a) camera.translateX(-speed);
        if (keys.d) camera.translateX(speed);
        
        camera.position.y += velocityY;
        velocityY -= 0.01; // Гравітація

        if (camera.position.y < 2) {
            camera.position.y = 2;
            velocityY = 0;
            canJump = true;
        }
        if (keys.space && canJump) { velocityY = 0.25; canJump = false; }

        // Колізії
        for(let obj of colliders) {
            if(camera.position.distanceTo(obj.position) < 2.2) camera.position.copy(oldPos);
        }
    }
    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    init();
}

// Щоб права кнопка миші не викликала меню
window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
