<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sandbox 3D Final</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        #login-screen { position: absolute; width: 100%; height: 100%; background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        input { padding: 12px; margin: 10px; width: 260px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; }
        button { padding: 12px 40px; cursor: pointer; background: #2ed573; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #hp-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid #fff; border-radius: 5px; }
        #hp-bar { width: 100%; height: 100%; background: #ff4757; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; pointer-events: all; }
        .slot { width: 50px; height: 50px; border: 2px solid #444; margin: 0 5px; display: flex; align-items: center; justify-content: center; color: white; border-radius: 8px; font-size: 20px; }
        .active { border-color: #2ed573; background: rgba(46, 213, 115, 0.2); }
        #my-id-display { position: absolute; top: 10px; right: 10px; color: #7af; font-size: 12px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="login-screen">
    <h1>SANDBOX 3D</h1>
    <input type="text" id="nick" placeholder="Твій нік...">
    <input type="text" id="remoteId" placeholder="ID друга (необов'язково)">
    <button id="start-btn">ГРАТИ</button>
</div>

<div id="ui">
    <div id="my-id-display">ID: <span id="my-id">...</span></div>
    <div id="hp-container"><div id="hp-bar"></div></div>
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active">🔫</div>
        <div class="slot">📦</div>
        <div class="slot">💃</div>
    </div>
</div>

<script>
// Використовуємо звичайний JS без import
let scene, camera, renderer, pistol, controlsLocked = false;
let hp = 100, isDead = false, currentSlot = 0;
const colliders = [], otherPlayers = {};
const keys = { w: false, a: false, s: false, d: false, space: false };
let velocityY = 0, canJump = false;
let peer, conn;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 10, 300);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // Земля
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000),
        new THREE.MeshLambertMaterial({ color: 0x2ed573 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Дерева
    for(let i=0; i<20; i++) {
        const x = Math.random()*100-50, z = Math.random()*100-50;
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 4), new THREE.MeshLambertMaterial({color: 0x5d3a1a}));
        trunk.position.set(x, 2, z);
        scene.add(trunk);
        colliders.push(trunk);
    }

    // Простий пістолет
    pistol = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.4), new THREE.MeshLambertMaterial({color: 0x111}));
    pistol.position.set(0.3, -0.2, -0.5);
    camera.add(pistol);
    scene.add(camera);

    // Блокування миші
    document.addEventListener('click', () => {
        if (!isDead) {
            document.body.requestPointerLock();
        }
    });

    document.addEventListener('pointerlockchange', () => {
        controlsLocked = document.pointerLockElement === document.body;
    });

    document.addEventListener('mousemove', (e) => {
        if (controlsLocked && !isDead) {
            camera.rotation.y -= e.movementX * 0.002;
            const newX = camera.rotation.x - e.movementY * 0.002;
            camera.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, newX));
        }
    });

    // Керування
    window.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') keys.w = true; if(e.code === 'KeyS') keys.s = true;
        if(e.code === 'KeyA') keys.a = true; if(e.code === 'KeyD') keys.d = true;
        if(e.code === 'Space') keys.space = true;
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') keys.w = false; if(e.code === 'KeyS') keys.s = false;
        if(e.code === 'KeyA') keys.a = false; if(e.code === 'KeyD') keys.d = false;
        if(e.code === 'Space') keys.space = false;
    });

    window.addEventListener('wheel', (e) => {
        currentSlot = e.deltaY > 0 ? (currentSlot + 1) % 3 : (currentSlot - 1 + 3) % 3;
        const slots = document.querySelectorAll('.slot');
        slots.forEach((s, i) => s.className = i === currentSlot ? 'slot active' : 'slot');
    });

    window.addEventListener('mousedown', (e) => {
        if(controlsLocked && e.button === 0) spawnItem();
    });

    animate();
}

function spawnItem() {
    if (currentSlot === 0) return; // Стрільба (візуально)
    
    const vector = new THREE.Vector3(0, 0, -1);
    vector.applyQuaternion(camera.quaternion);
    const pos = camera.position.clone().add(vector.multiplyScalar(5));
    
    const color = currentSlot === 1 ? 0xffffff : 0xffc0cb;
    const b = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshLambertMaterial({color: color}));
    b.position.copy(pos);
    if(pos.y < 0.75) b.position.y = 0.75;
    scene.add(b);
    colliders.push(b);
}

function animate() {
    requestAnimationFrame(animate);
    
    if (controlsLocked && !isDead) {
        const speed = 0.12;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        dir.y = 0; dir.normalize();
        const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();

        const oldPos = camera.position.clone();

        if (keys.w) camera.position.addScaledVector(dir, speed);
        if (keys.s) camera.position.addScaledVector(dir, -speed);
        if (keys.a) camera.position.addScaledVector(side, speed);
        if (keys.d) camera.position.addScaledVector(side, -speed);

        // Стрибки та гравітація
        velocityY -= 0.015;
        camera.position.y += velocityY;

        if (camera.position.y < 2) {
            camera.position.y = 2;
            velocityY = 0;
            canJump = true;
        }

        if (keys.space && canJump) {
            velocityY = 0.3;
            canJump = false;
        }

        // Колізії
        for(let obj of colliders) {
            if(camera.position.distanceTo(obj.position) < 2) camera.position.copy(oldPos);
        }

        if(conn && conn.open) conn.send({p: camera.position, r: camera.rotation.y});
    }
    
    renderer.render(scene, camera);
}

document.getElementById('start-btn').onclick = () => {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    init();

    // Мережа
    try {
        peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            const rId = document.getElementById('remoteId').value;
            if(rId) connectTo(rId);
        });
        peer.on('connection', (c) => { conn = c; listen(c); });
    } catch(e) { console.log("PeerJS не завантажився"); }
};

function connectTo(id) {
    conn = peer.connect(id);
    listen(conn);
}

function listen(c) {
    c.on('data', (data) => {
        if(!otherPlayers[c.peer]) {
            otherPlayers[c.peer] = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshLambertMaterial({color: 0xff0000}));
            scene.add(otherPlayers[c.peer]);
        }
        otherPlayers[c.peer].position.copy(data.p);
        otherPlayers[c.peer].rotation.y = data.r;
    });
}
</script>
</body>
</html>
