<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sandbox Survival Online</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        
        /* Смужка HP */
        #hp-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 250px; height: 15px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #ff4757; transition: 0.2s; }
        
        /* Меню входу */
        #login-screen { position: absolute; width: 100%; height: 100%; background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        input { padding: 12px; margin: 10px; width: 260px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; }
        button { padding: 12px 40px; cursor: pointer; background: #2ed573; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        
        /* Екран смерті */
        #death-screen { position: absolute; width: 100%; height: 100%; background: rgba(139, 0, 0, 0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: white; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px black; }
        
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; pointer-events: all; }
        .slot { width: 60px; height: 60px; border: 2px solid #444; margin: 0 5px; display: flex; align-items: center; justify-content: center; color: white; border-radius: 8px; font-size: 20px; }
        .active { border-color: #2ed573; background: rgba(46, 213, 115, 0.2); }
        
        #server-id-display { position: absolute; top: 10px; right: 10px; color: #7af; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 5px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="death-screen">
    <h1>ВИ ЗАГИНУЛИ</h1>
    <p>Відродження через <span id="timer">5</span>...</p>
</div>

<div id="login-screen">
    <h1>SANDBOX 3D</h1>
    <input type="text" id="nick" placeholder="Твій нік..." maxlength="10">
    <input type="text" id="remoteId" placeholder="ID ХОСТА (тільки для підключення)">
    <button onclick="startGame()">ПОЧАТИ ГРУ</button>
    <p style="font-size: 12px; color: #666; margin-top: 20px;">Якщо граєш сам, залиш ID хоста порожнім</p>
</div>

<div id="ui">
    <div id="server-id-display">Мій ID: <span id="my-id">Завантаження...</span></div>
    <div id="hp-container"><div id="hp-bar"></div></div>
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active">🔫</div>
        <div class="slot">📦</div>
        <div class="slot">💃</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

let scene, camera, renderer, controls, pistol;
let hp = 100, isDead = false, currentSlot = 0;
const colliders = [], otherPlayers = {};
let peer, conn;
const keys = { w: false, a: false, s: false, d: false, space: false };
let velocity = new THREE.Vector3();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 20, 500);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    // Зелене поле
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({ color: 0x2ed573 }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Дерева
    for(let i=0; i<30; i++) {
        const x = Math.random()*200-100;
        const z = Math.random()*200-100;
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 5), new THREE.MeshLambertMaterial({color: 0x5d3a1a}));
        trunk.position.set(x, 2.5, z);
        scene.add(trunk);
        colliders.push(trunk);
    }

    // Пістолет
    pistol = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.4), new THREE.MeshLambertMaterial({ color: 0x1a1a1a }));
    pistol.position.set(0.3, -0.3, -0.6);
    camera.add(pistol);
    scene.add(camera);

    controls = new PointerLockControls(camera, document.body);
    
    // Керування
    window.addEventListener('keydown', (e) => { 
        if(e.code === 'KeyW') keys.w = true; if(e.code === 'KeyS') keys.s = true;
        if(e.code === 'KeyA') keys.a = true; if(e.code === 'KeyD') keys.d = true;
        if(e.code === 'Space') keys.space = true;
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') keys.w = false; if(e.code === 'KeyS') keys.s = false;
        if(e.code === 'KeyA') keys.a = false; if(e.code === 'KeyD') keys.d = false;
        if(e.code === 'Space') keys.space = false;
    });

    window.addEventListener('mousedown', (e) => {
        if(!controls.isLocked || isDead) return;
        if(e.button === 0) {
            if(currentSlot === 0) shoot();
            else spawnItem(['block', 'jenny'][currentSlot-1]);
        }
    });

    window.addEventListener('wheel', (e) => {
        currentSlot = e.deltaY > 0 ? (currentSlot + 1) % 3 : (currentSlot - 1 + 3) % 3;
        const slots = document.querySelectorAll('.slot');
        slots.forEach((s, i) => s.className = i === currentSlot ? 'slot active' : 'slot');
        pistol.visible = (currentSlot === 0);
    });

    animate();
}

function spawnItem(type) {
    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    const pos = new THREE.Vector3().copy(camera.position).add(dir.multiplyScalar(6));
    pos.y = (type === 'block') ? 1 : 0;

    if(type === 'block') {
        const b = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({color: 0xeeeeee}));
        b.position.copy(pos);
        scene.add(b);
        colliders.push(b);
    } else {
        const loader = new OBJLoader();
        loader.load('jenny.obj', (obj) => {
            obj.traverse(c => { if(c.isMesh) c.material = new THREE.MeshLambertMaterial({map: new THREE.TextureLoader().load('jenny.png')})});
            obj.position.copy(pos);
            obj.scale.set(4,4,4);
            scene.add(obj);
            colliders.push(obj);
        });
    }
}

function shoot() {
    pistol.position.z += 0.1; setTimeout(() => pistol.position.z -= 0.1, 50);
    if(conn && conn.open) {
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const intersects = raycaster.intersectObjects(Object.values(otherPlayers));
        if(intersects.length > 0) conn.send({ type: 'damage', amount: 25 });
    }
}

function takeDamage(amount) {
    hp -= amount;
    document.getElementById('hp-bar').style.width = hp + "%";
    if(hp <= 0 && !isDead) {
        isDead = true;
        controls.unlock();
        document.getElementById('death-screen').style.display = 'flex';
        let count = 5;
        const timer = setInterval(() => {
            count--;
            document.getElementById('timer').innerText = count;
            if(count <= 0) {
                clearInterval(timer);
                hp = 100; isDead = false;
                document.getElementById('hp-bar').style.width = "100%";
                document.getElementById('death-screen').style.display = 'none';
                camera.position.set(0,2,0);
                controls.lock();
            }
        }, 1000);
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(controls.isLocked && !isDead) {
        const delta = 0.15;
        const oldPos = camera.position.clone();
        if(keys.w) controls.moveForward(delta);
        if(keys.s) controls.moveForward(-delta);
        if(keys.a) controls.moveRight(-delta);
        if(keys.d) controls.moveRight(delta);
        
        // Колізії
        for(let obj of colliders) {
            if(camera.position.distanceTo(obj.position) < 2.5) camera.position.copy(oldPos);
        }

        if(conn && conn.open) conn.send({ type: 'move', pos: camera.position, rot: camera.rotation.y });
    }
    renderer.render(scene, camera);
}

// ПІДКЛЮЧЕННЯ
window.startGame = () => {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    init();
    controls.lock();

    peer = new Peer();
    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        const rId = document.getElementById('remoteId').value;
        if(rId) {
            conn = peer.connect(rId);
            setupNetwork(conn);
        }
    });
    peer.on('connection', (c) => {
        conn = c;
        setupNetwork(conn);
    });
};

function setupNetwork(c) {
    c.on('data', (data) => {
        if(data.type === 'move') {
            if(!otherPlayers[c.peer]) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.2), new THREE.MeshLambertMaterial({color: 0xff4757}));
                scene.add(m);
                otherPlayers[c.peer] = m;
            }
            otherPlayers[c.peer].position.copy(data.pos);
            otherPlayers[c.peer].rotation.y = data.rot;
        }
        if(data.type === 'damage') takeDamage(data.amount);
    });
}
</script>
</body>
</html>
